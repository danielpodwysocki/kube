---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 5m
  chart:
    spec:
      chart: longhorn
      version: '1.2.3'
      sourceRef:
        kind: HelmRepository
        name: longhorn-charts
        namespace: flux-system
      interval: 1m
  values:
    longhornManager:
      nodeSelector:
        kubernetes.io/hostname: "xardas"
    longhornDriver:
      nodeSelector:
        kubernetes.io/hostname: "xardas"
    longhornUI:
      nodeSelector:
        kubernetes.io/hostname: "xardas"
    defaultSettings:
      createDefaultDiskLabeledNodes: true 
      defaultDataPath: /opt/longhorn 
