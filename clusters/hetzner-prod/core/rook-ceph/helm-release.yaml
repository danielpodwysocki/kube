---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: rook-ceph
  namespace: rook-ceph
spec:
  interval: 5m
  chart:
    spec:
      chart: rook-ceph
      version: 'v1.8.0'
      sourceRef:
        kind: HelmRepository
        name: rook-charts
        namespace: flux-system
      interval: 1m
  values:
    nodeSelector:
      kubernetes.io/hostname: "xardas"

