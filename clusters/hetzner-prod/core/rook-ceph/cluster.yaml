---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: rook-ceph-cluster
  namespace: rook-ceph
spec:
  interval: 5m
  chart:
    spec:
      chart: rook-ceph-cluster
      version: 'v1.8.0'
      sourceRef:
        kind: HelmRepository
        name: rook-charts
        namespace: flux-system
      interval: 1m
  values:
    cephClusterSpec:
      image: quay.io/ceph/ceph:v16.2.7
      dataDirHostPath: /var/lib/rook
      mon:
        count: 1 
        allowMultiplePerNode: false
      storage:
        useAllNodes: false
        nodes:
           - name: "xardas"
        useAllDevices: true

