---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 5m
  releaseName: authentik 
  chart:
    spec:
      chart: authentik
      sourceRef:
        kind: HelmRepository
        name: authentik-charts
        namespace: flux-system
  values:
    authentik:
      secret_key: "${AUTHENTIK_SECRET_KEY}"
      error_reporting:
        enabled: false
      postgresql:
        password: "${AUTHENTIK_POSTGRES_PASSWORD}"

    ingress:
      enabled: true
      hosts:
      - host: auth.dapo.tech
        paths:
        - path: "/"
          pathType: Prefix
    
    postgresql:
      enabled: true
      postgresqlPassword: "${AUTHENTIK_POSTGRES_PASSWORD}"
    redis:
      enabled: true
    
