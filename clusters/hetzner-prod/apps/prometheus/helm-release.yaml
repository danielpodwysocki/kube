---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 5m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 23.2.0
      sourceRef:
        kind: HelmRepository
        name: prometheus-stack-charts
        namespace: flux-system
  values:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-device
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 5G

